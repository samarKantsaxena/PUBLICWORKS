<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Dashboard – PUBLICWORKS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #f8fafc; }
        #map { height: 400px; border-radius: 16px; margin-bottom: 1rem; }
        .card { border: none; border-radius: 20px; }
        .btn-warning { border-radius: 40px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="/">PUBLICWORKS</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link" href="terms.html">Terms</a></li>
                <li class="nav-item" id="loginNav"><a class="nav-link" href="login.html">Login</a></li>
                <li class="nav-item" id="signupNav"><a class="nav-link" href="signup.html">Sign Up</a></li>
                <li class="nav-item" id="userGreetingNav" style="display:none;"><span class="nav-link">👋</span></li>
                <li class="nav-item" id="logoutNav" style="display:none;"><button id="logoutBtnHeader" class="btn btn-outline-danger btn-sm">Logout</button></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row g-4">
        <div class="col-md-5">
            <div class="card shadow-sm p-4">
                <h5><i class="bi bi-plus-circle"></i> Report a New Issue</h5>
                <form id="reportForm">
                    <input type="text" id="title" class="form-control mb-2" placeholder="Title" required>
                    <textarea id="desc" class="form-control mb-2" placeholder="Description" rows="2"></textarea>
                    <label class="form-label small">Click on the map to set location</label>
                    <div id="map"></div>
                    <button type="button" id="getLocationBtn" class="btn btn-sm btn-secondary mt-2"><i class="bi bi-geo-alt"></i> Use my location</button>
                    <input type="file" id="photo" class="form-control mt-2" accept="image/*">
                    <button type="submit" class="btn btn-warning w-100 mt-3">Submit Issue</button>
                </form>
                <div id="submitMsg" class="mt-2 small text-center"></div>
            </div>
        </div>
        <div class="col-md-7">
            <div class="card shadow-sm p-4">
                <h5><i class="bi bi-list-ul"></i> My Reported Issues</h5>
                <div id="myIssues">Loading...</div>
            </div>
        </div>
    </div>
</div>
<footer class="text-center mt-5 py-3 bg-white border-top">
    <button id="coffeeFooter" class="btn btn-sm btn-outline-warning rounded-pill"><i class="bi bi-cup-hot-fill"></i> Buy Me a Coffee</button>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ========== YOUR SUPABASE CREDENTIALS ==========
    const SUPABASE_URL = "https://mdjcyvzkfkrhxklipvgr.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1kamN5dnprZmtyaHhrbGlwdmdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExOTk1MjIsImV4cCI6MjA5Njc3NTUyMn0.8xUaAJm5WQbhnqDasCiMUAg6vSOKoDTms9USSPcyklk";
    const BACKEND_URL = "http://127.0.0.1:5000";
    // ============================================

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let map, marker;
    let selectedLat = null, selectedLng = null;

    // Initialise map when page is ready
    document.addEventListener('DOMContentLoaded', () => {
        map = L.map('map').setView([20.5937, 78.9629], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
        }).addTo(map);
        map.on('click', (e) => {
            if (marker) map.removeLayer(marker);
            marker = L.marker(e.latlng).addTo(map);
            selectedLat = e.latlng.lat;
            selectedLng = e.latlng.lng;
            document.getElementById('submitMsg').innerHTML = `<span class="text-success">Location set: ${selectedLat.toFixed(4)}, ${selectedLng.toFixed(4)}</span>`;
        });
    });

    // Use my location button
    document.getElementById('getLocationBtn').addEventListener('click', () => {
        if (!navigator.geolocation) {
            alert("Geolocation not supported by your browser.");
            return;
        }
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                if (marker) map.removeLayer(marker);
                marker = L.marker([lat, lng]).addTo(map);
                map.setView([lat, lng], 16);
                selectedLat = lat;
                selectedLng = lng;
                document.getElementById('submitMsg').innerHTML = `<span class="text-success">Location set to current: ${lat.toFixed(4)}, ${lng.toFixed(4)}</span>`;
            },
            (err) => {
                alert("Unable to get location: " + err.message);
            }
        );
    });

    // Load user's issues
    async function loadMyIssues() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (!user) { window.location.href = '/login.html'; return; }
        const { data, error } = await supabaseClient.from('issues').select('*').eq('user_id', user.id).order('created_at', { ascending: false });
        const container = document.getElementById('myIssues');
        if (error || !data || data.length === 0) {
            container.innerHTML = '<p class="text-muted">No issues reported yet.</p>';
            return;
        }
        let html = '';
        data.forEach(issue => {
            let statusClass = issue.status === 'reported' ? 'bg-danger' : (issue.status === 'in_progress' ? 'bg-warning' : 'bg-success');
            html += `
                <div class="border rounded p-3 mb-2">
                    <div class="d-flex justify-content-between">
                        <b>${escapeHtml(issue.title)}</b>
                        <span class="badge ${statusClass} text-white">${issue.status}</span>
                    </div>
                    <p class="small text-muted mt-1">${escapeHtml(issue.description?.substring(0, 80))}</p>
                    <a href="/issue.html?id=${issue.id}" class="btn btn-sm btn-outline-secondary">View</a>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    // Submit new issue
    document.getElementById('reportForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('title').value.trim();
        const description = document.getElementById('desc').value.trim();
        if (!selectedLat || !selectedLng) {
            alert('Please select a location on the map or click "Use my location".');
            return;
        }
        const photoFile = document.getElementById('photo').files[0];
        let imageUrl = '';
        const { data: { session } } = await supabaseClient.auth.getSession();
        const token = session?.access_token;
        if (!token) { alert('You must be logged in.'); return; }
        if (photoFile) {
            const formData = new FormData();
            formData.append('photo', photoFile);
            const uploadRes = await fetch(`${BACKEND_URL}/upload-photo`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            const uploadData = await uploadRes.json();
            if (uploadData.url) imageUrl = uploadData.url;
        }
        const response = await fetch(`${BACKEND_URL}/report-issue`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ title, description, latitude: selectedLat, longitude: selectedLng, image_url: imageUrl })
        });
        const result = await response.json();
        if (result.success) {
            alert('Issue reported!');
            document.getElementById('reportForm').reset();
            if (marker) map.removeLayer(marker);
            selectedLat = null; selectedLng = null;
            document.getElementById('submitMsg').innerHTML = '';
            loadMyIssues();
        } else {
            alert('Error: ' + (result.error || 'Submission failed'));
        }
    });

    function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' })[m]) || ''; }

    // Navbar logic (login / logout)
    document.addEventListener('DOMContentLoaded', async () => {
        const { data: { user } } = await supabaseClient.auth.getUser();
        const loginNav = document.getElementById('loginNav');
        const signupNav = document.getElementById('signupNav');
        const userGreeting = document.getElementById('userGreetingNav');
        const logoutNav = document.getElementById('logoutNav');
        const logoutBtn = document.getElementById('logoutBtnHeader');
        if (user) {
            const { data: profile } = await supabaseClient.from('profiles').select('full_name').eq('id', user.id).single();
            const fullName = profile?.full_name || 'User';
            if (loginNav) loginNav.style.display = 'none';
            if (signupNav) signupNav.style.display = 'none';
            if (userGreeting) {
                userGreeting.style.display = 'block';
                const span = userGreeting.querySelector('.nav-link');
                if (span) span.innerHTML = `👋 Hello, ${fullName}`;
            }
            if (logoutNav) {
                logoutNav.style.display = 'block';
                if (logoutBtn) {
                    logoutBtn.addEventListener('click', async (e) => {
                        e.preventDefault();
                        await supabaseClient.auth.signOut();
                        window.location.href = '/';
                    });
                }
            }
        } else {
            if (loginNav) loginNav.style.display = 'block';
            if (signupNav) signupNav.style.display = 'block';
            if (userGreeting) userGreeting.style.display = 'none';
            if (logoutNav) logoutNav.style.display = 'none';
        }
        await loadMyIssues();
    });

    document.getElementById('coffeeFooter').addEventListener('click', () => alert('☕ Buy Me a Coffee link coming soon'));
</script>
</body>
</html>
